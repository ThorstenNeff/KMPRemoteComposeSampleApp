#   ALL 16 docs gated (PO: demo app → every tappable doc must render; A=new DSL-builder code, B=new load path).
#   ONLY the 5 nav-CONTAINER testTags PENDING — fill via inspect_screen at the Phase-1 cue, drop `staged`.
#   Convention (dev-1): list-item testTag = rc-docitem-<id>; after tap, rc-doc == <id>. testTagsAsResourceId=true.
#   iOS caveats: edge-swipe RIGHT from left edge = iOS system-back → use `back`; off-screen items via scrollUntilVisible.
# Run (on cue): ~/.maestro/bin/maestro --device <ios-udid> test example_render_gate_ios.yaml
